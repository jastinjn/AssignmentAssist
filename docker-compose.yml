services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assignmentassist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assignmentassist"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
